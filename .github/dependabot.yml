version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "develop"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/backend"
    target-branch: "develop"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

    # Regroupement des updates
    groups:
      patch-and-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

      major:
        patterns:
          - "*"
        update-types:
          - "major"

    # Labels auto
    labels:
      - "dependencies"
      - "dependabot"

    # Assignation auto (optionnel)
    assignees:
      - "ton-username"

    # Ignore certains packages (exemple)
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]