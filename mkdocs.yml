site_name: Gmail Manager
site_description: Application self-hosted de gestion et d'archivage Gmail
site_url: https://befa160.github.io/gmail-manager
repo_url: https://github.com/befa160/gmail-manager
repo_name: gmail-manager
edit_uri: edit/main/docs/

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang: fr

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Accueil: index.md
  - Démarrage:
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
    - Premier lancement: getting-started/first-run.md
  - Architecture:
    - Vue d'ensemble: architecture/overview.md
    - Backend: architecture/backend.md
    - Frontend: architecture/frontend.md
    - Base de données: architecture/database.md
    - Jobs & Queue: architecture/jobs.md
  - API:
    - Authentification: api/auth.md
    - Gmail: api/gmail.md
    - Archives: api/archive.md
    - Règles: api/rules.md
    - Dashboard: api/dashboard.md
    - Jobs: api/jobs.md
  - Développement:
    - Contribuer: development/contributing.md
    - Roadmap: development/roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/befa160/gmail-manager
