      - Archives: technical/api/archive.md
      - Règles: technical/api/rules.md
      - Dashboard: technical/api/dashboard.md
      - Jobs: technical/api/jobs.md
      - Admin: technical/api/admin.md
      - Audit log: technical/api/audit.md
      - Doublons: technical/api/duplicates.md
