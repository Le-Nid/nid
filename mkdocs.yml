site_name: Gmail Manager
site_description: Application self-hosted de gestion et d'archivage Gmail
site_url: https://befa160.github.io/gmail-manager
repo_url: https://github.com/befa160/gmail-manager
repo_name: gmail-manager
edit_uri: edit/main/docs/

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang: fr

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Accueil: index.md
  - 📥 Installation:
    - Démarrage rapide: installation/index.md
    - Configuration Google Cloud: installation/google-cloud.md
    - Configuration détaillée: installation/configuration.md
    - Déploiement production: installation/production.md
    - Environnement de développement: installation/development.md
  - 📖 Guide utilisateur:
