    - Premiers pas: guide/first-steps.md
    - Dashboard: guide/dashboard.md
    - Gestion des mails: guide/mail-management.md
    - Archivage: guide/archiving.md
    - Règles automatiques: guide/rules.md
    - Suivi des jobs: guide/jobs.md
    - Newsletters: guide/newsletters.md
    - Pièces jointes: guide/attachments.md
    - Doublons: guide/duplicates.md
    - Analytics & Insights: guide/analytics.md
    - Vie privée: guide/privacy.md
    - Boîte unifiée: guide/unified-inbox.md
    - Recherches sauvegardées: guide/saved-searches.md
    - Notifications & Webhooks: guide/notifications.md
    - Paramètres: guide/settings.md
    - Administration: guide/admin.md
  - 🔧 Documentation technique:
