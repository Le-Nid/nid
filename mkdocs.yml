      - Pièces jointes: technical/api/attachments.md
      - Rapports: technical/api/reports.md
      - Notifications: technical/api/notifications.md
      - Intégrité: technical/api/integrity.md
      - Webhooks: technical/api/webhooks.md
      - Configuration: technical/api/config.md
      - Vie privée: technical/api/privacy.md
      - Analytics: technical/api/analytics.md
